# Agent Chat 依赖的基础服务

services:
  # ── Qdrant 向量数据库 ──
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agent-qdrant
    ports:
      - "6333:6333"      # REST API
      - "6334:6334"      # gRPC（可选）
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
